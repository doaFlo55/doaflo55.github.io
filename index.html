<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DoA FLOSS | Stealth Infrastructure</title>
    <style>
        body { margin: 0; background: #0a0a0a; color: #ccc; font-family: sans-serif; }
        
        /* The Header Dashboard Bar */
        .dash-nav { 
            background: #000; border-bottom: 1px solid #333; 
            padding: 10px 20px; display: flex; gap: 20px; font-size: 0.9em;
        }
        .dash-nav a { color: #888; text-decoration: none; }
        .dash-nav a:hover { color: #fff; }
        
        .main-container { max-width: 900px; margin: 20px auto; padding: 0 20px; }
        
        /* Consistent with your ReverbNation "look" */
        .header-section { margin-bottom: 30px; }
        .song-row { 
            background: #111; padding: 15px; margin-bottom: 5px; 
            display: flex; justify-content: space-between; border: 1px solid #222;
        }
        
        /* Command Hub */
        .command-hub { 
            background: #161616; padding: 15px; border: 1px solid #333; 
            display: flex; gap: 15px; margin-bottom: 20px;
        }
    </style>
</head>
<body>

    <div class="dash-nav">
        <strong>DoA FLOSS</strong>
        <a href="#">Dashboard</a>
        <a href="#">Content</a>
        <a href="#">Tools</a>
        <a href="#">Promote</a>
        <a href="#">Opportunities</a>
        <a href="#">Distribution</a>
    </div>

    <div class="main-container">
        <div class="header-section">
            <h1>DoA FLOSS</h1>
            <p>Architecture of Unified Values & Media Synchronization</p>
        </div>

        <div class="command-hub">
            <button onclick="speakText()">🔊 Declaration</button>
            <button onclick="toggleSection('payments')">💳 Payment Hub</button>
            <button onclick="toggleSection('pools')">💧 Liquidity Pools</button>
            <button onclick="toggleSection('archive')">📦 Archive Access</button>
        </div>

        <div id="payments" style="display:none;">
            <h3>Payment & Exchange</h3>
            </div>

        <div id="pools" style="display:none;">
            <h3>Active Liquidity Nodes</h3>
            <div class="song-row"><span>eXCH / SLVR</span> <a href="#">Trade</a></div>
            <div class="song-row"><span>XLM / eXCH</span> <a href="#">Trade</a></div>
        </div>

        <div id="archive" style="display:none;">
            <h3>Official Documents</h3>
            <pre>[PROTOCOL DEFINITIONS] ... </pre>
        </div>
    </div>

    <script>
        function toggleSection(id) {
            const el = document.getElementById(id);
            el.style.display = (el.style.display === 'block') ? 'none' : 'block';
        }
        function speakText() { /* logic */ }
    </script>
</body>
</html>
