<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <style>
        :root { --bg-color: #000; --card-bg: #121212; --border-color: #333; --text-color: #fff; }
        body { background-color: var(--bg-color); color: var(--text-color); font-family: 'Courier New', monospace; margin: 0; padding: 20px; }
        
        .dashboard-container { display: grid; grid-template-columns: 2fr 1fr; gap: 15px; max-width: 1400px; margin: auto; }
        .card { background: var(--card-bg); border: 1px solid var(--border-color); padding: 20px; }
        
        /* Account Title Style */
        .account-title { font-family: 'Courier New', monospace; font-size: 0.9em; color: #888; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 1px; }
        .account-address { font-family: 'Courier New', monospace; font-size: 1.1em; color: #fff; word-break: break-all; margin-bottom: 20px; background: rgba(255,255,255,0.05); padding: 10px; border-left: 3px solid #444; }
        
        /* Table Styles */
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        td { padding: 8px; border: 1px solid #333; color: #ccc; }
        strong { color: #fff; }
        
        /* Button Grids */
        .button-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 20px; }
        .blank-btn { height: 40px; border: 1px solid #333; background: #0a0a0a; cursor: pointer; }
        .blank-btn:hover { background: #222; }
        
        .right-column { display: flex; flex-direction: column; gap: 15px; }
        .stellar-btn { background: #1a1a1a; border: 1px solid #444; color: #fff; padding: 10px; text-align: center; cursor: pointer; font-size: 11px; text-transform: uppercase; }
        .ddos-btn { border-color: #800 !important; color: #f00 !important; }
        .burn-btn { border: 2px solid #ff4500 !important; color: #ff4500 !important; font-weight: bold; grid-column: span 2; margin-top: 10px; }
        
        footer { text-align: center; margin-top: 40px; font-size: 0.8em; color: #444; border-top: 1px solid #222; padding-top: 20px; }
    </style>
</head>
<body>

<div class="dashboard-container">
    <!-- LEFT: STEALTH TRACK -->
    <div class="card">
        <div class="account-title">Account</div>
        <div class="account-address">GDL4IW2SBNV3XH24ZT3ZUSSCVH6BX4DX4ATJMDMYJVZHY47VCPLINIM</div>
        
        <h2>STEALTH TRACK: AUDIT REGISTRY</h2>
        <div class="button-grid">
            <div class="blank-btn"></div><div class="blank-btn"></div>
            <div class="blank-btn"></div><div class="blank-btn"></div>
        </div>
        <table>
            <!-- Registry Rows -->
        </table>
    </div>

    <!-- RIGHT: COMMAND CENTER -->
    <div class="right-column">
        <div class="card">
            <h2>CRYPTO CLAIMS</h2>
            <div class="button-grid" style="grid-template-columns: repeat(2, 1fr);">
                <div class="stellar-btn ddos-btn">DDoS</div>
                <div class="stellar-btn">XLM</div>
                <div class="stellar-btn">PYUSD</div><div class="stellar-btn">BTC</div>
                <div class="stellar-btn">SLVR</div><div class="stellar-btn">yXLM</div>
                <div class="stellar-btn">eXCH</div><div class="stellar-btn">MOGLMN</div>
                <div class="stellar-btn">OPLZ</div><div class="stellar-btn">paypXL</div>
                <div class="stellar-btn burn-btn">BURN🔥</div>
            </div>
        </div>
        
        <div class="card" style="padding: 0; overflow: hidden;">
            <script type="module" src="https://widgets.tradingview-widget.com/w/en/tv-ticker-tape.js"></script>
            <tv-ticker-tape symbols="CRYPTOCAP:BTC,CRYPTOCAP:XLM,COINBASE:BTCUSD" theme="dark" style="width: 100%"></tv-ticker-tape>
        </div>
    </div>
</div>

<footer>
    2026 DOA FLOSS. All Rights Reserved. <br>
    Copyright Protected | Hosted by GitHub
</footer>

</body>
</html>
